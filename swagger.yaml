    put:
      tags: [Orders Admin]
      summary: Update order status with tracking number (Admin only)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: orderId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - status
              properties:
                status:
                  type: string
                  enum: [accepted, ready_to_ship, picked_up, in_transit, delivered, cancelled]
                  description: "New order status"
                note:
                  type: string
                  description: "Optional note about the status change"
                trackingNumber:
                  type: string
                  description: "Tracking number (required for shipping statuses: ready_to_ship, picked_up, in_transit)"
                  example: "FDX123456789"
            examples:
              accepted:
                summary: Accept order
                value:
                  status: "accepted"
                  note: "Order confirmed and processing"
              
              ready_to_ship:
                summary: Mark as ready to ship
                value:
                  status: "ready_to_ship"
                  note: "Package ready for courier pickup"
                  trackingNumber: "FDX123456789"
              
              in_transit:
                summary: Mark as in transit
                value:
                  status: "in_transit"
                  note: "Order shipped via FedEx"
                  trackingNumber: "FDX123456789"
      responses:
        200:
          description: Order status updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/Order'
